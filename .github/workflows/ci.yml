name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the generated Prisma client keyed on schema content.
      # On a cache hit the generate step is skipped, saving ~10-15s per job.
      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: '**/node_modules/.prisma'
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/db/prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the generated Prisma client keyed on schema content.
      # On a cache hit the generate step is skipped, saving ~10-15s per job.
      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: '**/node_modules/.prisma'
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/db/prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm db:generate

      - name: Build
        run: pnpm build
